<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>APDocentePBA Registro</title>

<style>
body{
font-family:Arial;
background:#eef6f9;
padding:40px;
}

.container{
background:white;
padding:30px;
max-width:700px;
margin:auto;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin:5px 0 15px;
}

button{
padding:12px 20px;
background:#0c7fa3;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.success{
background:#d7f5e1;
padding:10px;
border-radius:5px;
margin-top:10px;
display:none;
}

.error{
background:#ffdede;
padding:10px;
border-radius:5px;
margin-top:10px;
display:none;
}

</style>
</head>

<body>

<div class="container">

<h2>Registro docente</h2>

<form id="registroForm" method="POST" target="ocultoFrame">

<label>Nombre y apellido</label>
<input id="nombre" required>

<label>Email</label>
<input id="email" type="email" required>

<label>Celular</label>
<input id="celular">

<label>Distrito principal</label>
<select id="distritoPrincipal"></select>

<label>Distrito interés 2</label>
<select id="distritoInteres2"></select>

<label>Distrito interés 3</label>
<select id="distritoInteres3"></select>

<label>Materia 1</label>
<input id="materia1">

<label>Materia 2</label>
<input id="materia2">

<label>Materia 3</label>
<input id="materia3">

<label>Turno</label>
<select id="turno">
<option>Mañana</option>
<option>Tarde</option>
<option>Vespertino</option>
<option>Noche</option>
</select>

<label>Tipo cargo</label>
<select id="tipoCargo">
<option>Módulos / Horas cátedra</option>
<option>Cargo</option>
<option>Ambos</option>
</select>

<br>

<label><input type="checkbox" id="aceptoEmail"> Acepto recibir alertas</label>
<br>
<label><input type="checkbox" id="aceptoTyC"> Acepto términos</label>

<input type="hidden" name="payload" id="payload">

<br>

<button type="submit">Confirmar registro</button>

<div id="ok" class="success">Registro enviado</div>
<div id="error" class="error">Error al enviar</div>

</form>

</div>

<iframe name="ocultoFrame" style="display:none;"></iframe>

<script>

const WEB_APP_URL="PEGAR_AQUI_TU_URL_EXEC";

const DISTRITOS=[
"Avellaneda",
"Lanús",
"Quilmes",
"Lomas de Zamora",
"La Plata",
"Morón",
"La Matanza"
];

function cargarDistritos(){

["distritoPrincipal","distritoInteres2","distritoInteres3"].forEach(id=>{

let select=document.getElementById(id);

DISTRITOS.forEach(d=>{
let op=document.createElement("option");
op.value=d;
op.textContent=d;
select.appendChild(op);
});

});

}

cargarDistritos();

const form=document.getElementById("registroForm");

form.action=WEB_APP_URL;

form.addEventListener("submit",function(e){

e.preventDefault();

const payload={
nombre:document.getElementById("nombre").value,
email:document.getElementById("email").value,
celular:document.getElementById("celular").value,
distritoPrincipal:document.getElementById("distritoPrincipal").value,
distritoInteres2:document.getElementById("distritoInteres2").value,
distritoInteres3:document.getElementById("distritoInteres3").value,
materia1:document.getElementById("materia1").value,
materia2:document.getElementById("materia2").value,
materia3:document.getElementById("materia3").value,
turno:document.getElementById("turno").value,
tipoCargo:document.getElementById("tipoCargo").value,
aceptaEmail:document.getElementById("aceptoEmail").checked,
aceptaTyC:document.getElementById("aceptoTyC").checked
};

document.getElementById("payload").value=JSON.stringify(payload);

form.submit();

document.getElementById("ok").style.display="block";

});

</script>

</body>
</html>
