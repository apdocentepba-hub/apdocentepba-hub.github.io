<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>APDocentePBA | Radar docente</title>

<style>

body{
font-family:Arial;
background:#eef8fb;
margin:0;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

header{
background:white;
border-bottom:1px solid #d1e8ef;
padding:15px;
}

.brand{
display:flex;
align-items:center;
gap:10px;
}

.brand img{
width:50px;
}

.hero{
background:white;
padding:30px;
margin-top:20px;
border-radius:12px;
}

h1{
color:#115c77;
}

form{
background:white;
padding:25px;
margin-top:20px;
border-radius:12px;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #d1e8ef;
border-radius:8px;
}

button{
background:#115c77;
color:white;
padding:12px 20px;
border:none;
border-radius:20px;
cursor:pointer;
}

button:hover{
background:#0b4b62;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.full{
grid-column:1/-1;
}

.checkbox-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:10px;
}

.msg{
padding:10px;
border-radius:8px;
margin-top:10px;
display:none;
}

.ok{
background:#e6f7ef;
color:#17794d;
}

.error{
background:#fdeeee;
color:#a33d3d;
}

</style>

</head>
<body>

<header>
<div class="container brand">

<img src="logo.png">

<div>
<strong>APDocentePBA</strong><br>
Radar docente
</div>

</div>
</header>

<div class="container">

<div class="hero">

<h1>Registro docente</h1>

<p>
Registrate para recibir alertas de actos públicos digitales según tus preferencias.
</p>

</div>

<form id="registroForm">

<div class="grid">

<div class="full">
<label>Nombre y apellido</label>
<input type="text" id="nombre" required>
</div>

<div>
<label>Email</label>
<input type="email" id="email" required>
</div>

<div>
<label>Celular</label>
<input type="text" id="celular">
</div>

<div>
<label>Distrito principal</label>
<select id="distritoPrincipal"></select>
</div>

<div>
<label>Distrito interés 2</label>
<select id="distrito2"></select>
</div>

<div>
<label>Distrito interés 3</label>
<select id="distrito3"></select>
</div>

<div>
<label>Materia / área 1</label>
<input type="text" id="materia1" required>
</div>

<div>
<label>Materia / área 2</label>
<input type="text" id="materia2">
</div>

<div>
<label>Materia / área 3</label>
<input type="text" id="materia3">
</div>

<div class="full">

<label>Nivel / modalidad</label>

<div class="checkbox-grid">

<label><input type="checkbox" value="Inicial"> Inicial</label>
<label><input type="checkbox" value="Primaria"> Primaria</label>
<label><input type="checkbox" value="Secundaria"> Secundaria</label>
<label><input type="checkbox" value="Secundaria Técnica"> Secundaria Técnica</label>
<label><input type="checkbox" value="Secundaria Agraria"> Secundaria Agraria</label>
<label><input type="checkbox" value="Educación de Adultos (CENS)"> CENS</label>
<label><input type="checkbox" value="Educación Especial"> Especial</label>
<label><input type="checkbox" value="Educación Artística"> Artística</label>
<label><input type="checkbox" value="Educación Física"> Física</label>
<label><input type="checkbox" value="Educación Superior"> Superior</label>

</div>

</div>

<div>
<label>Turno</label>
<select id="turno">

<option>Mañana</option>
<option>Tarde</option>
<option>Vespertino</option>
<option>Noche</option>
<option>Cualquiera</option>

</select>
</div>

<div>
<label>Tipo de cargo</label>

<select id="tipoCargo">

<option>Módulos / Horas cátedra</option>
<option>Cargo</option>
<option>Ambos</option>

</select>

</div>

<div class="full">

<label>
<input type="checkbox" id="aceptaEmail">
Aceptar alertas por email
</label>

</div>

<div class="full">

<label>
<input type="checkbox" id="aceptaTyC">
Aceptar términos
</label>

</div>

</div>

<button type="submit">Registrar</button>

<div id="ok" class="msg ok"></div>
<div id="error" class="msg error"></div>

</form>

</div>

<script>

const WEB_APP_URL="https://script.google.com/macros/s/AKfycbyawEj2viIP8N4s0FW7yLNHSW4DoZ_KYiFVN0u0Q_HbO5MY0QFQEkBm_4QpN9bDv4td/exec"

const DISTRITOS=[
"Avellaneda",
"Lanús",
"La Plata",
"Quilmes",
"Berazategui",
"Florencio Varela",
"Almirante Brown",
"Esteban Echeverría",
"Ezeiza",
"Lomas de Zamora",
"La Matanza",
"Morón",
"Merlo",
"Moreno",
"Tigre",
"San Isidro",
"San Martín",
"Vicente López",
"San Fernando"
]

function cargarDistritos(){

const selects=[
distritoPrincipal,
distrito2,
distrito3
]

selects.forEach(s=>{

let opt=document.createElement("option")
opt.text="Seleccionar"
opt.value=""
s.appendChild(opt)

DISTRITOS.forEach(d=>{

let o=document.createElement("option")
o.value=d
o.text=d
s.appendChild(o)

})

})

}

cargarDistritos()

const form=document.getElementById("registroForm")

form.addEventListener("submit",async e=>{

e.preventDefault()

ok.style.display="none"
error.style.display="none"

const niveles=[...document.querySelectorAll(".checkbox-grid input:checked")].map(e=>e.value)

const data={

nombre:nombre.value,
email:email.value,
celular:celular.value,
distritoPrincipal:distritoPrincipal.value,
distritoInteres2:distrito2.value,
distritoInteres3:distrito3.value,
materia1:materia1.value,
materia2:materia2.value,
materia3:materia3.value,
nivelesModalidad:niveles,
turno:turno.value,
tipoCargo:tipoCargo.value,
aceptaEmail:aceptaEmail.checked,
aceptaTyC:aceptaTyC.checked

}

try{

const res=await fetch(WEB_APP_URL,{

method:"POST",
body:JSON.stringify(data)

})

const txt=await res.text()

const json=JSON.parse(txt)

if(json.ok){

ok.innerText="Registro guardado correctamente"
ok.style.display="block"
form.reset()

}else{

error.innerText=json.mensaje
error.style.display="block"

}

}catch(e){

error.innerText="No se pudo conectar con el servidor"
error.style.display="block"

}

})

</script>

</body>
</html>
